# zhuang_system — 庄股跟庄策略配置
# 策略逻辑：识别吃货期（主力积累阶段），在低位共振建仓，拉升期持仓，5日止盈/止损退出
#
# Phase 1-C (2026-05-25): 加 markets: 子字典支持多 market dispatch。
#   - daily_zhuang.py / backtest_zhuang.py 可加 --market hk_small 跑 HK 占位 (Phase 1-D 接入)
#   - 8 个 scripts/backtest/*_zhuang.py 沿用 yaml.safe_load 不走 split-config 装配器, 默认 market=a_share
#   - 顶层 universe 字段保留 (向下兼容): ZhuangDataLoader 优先读 markets[market], 缺失回退顶层 universe

# 默认 market (向下兼容旧 scripts/cron 不带 --market 调用)
default_market: a_share

universe:
  market: a_share
  market_cap_min_cny: 5_000_000_000     # 50亿（下限：流动性保证）→ 注意单位是元
  market_cap_max_cny: 200_000_000_000   # 2000亿（上限：排除大蓝筹，庄股集中在中小盘）
  exclude_st: true                       # 排除 ST / *ST（已有风险警示）
  min_listed_days: 365                   # 上市未满 1 年不纳入（规避次新股陷阱）
  min_price: 2.0                         # 最低股价 2 元（排除仙股）

# 多 market 配置 (Phase 1-C). 字段集与顶层 universe 平行;
# data_provider / benchmark / fees 是市场特有字段, 顶层 backtest.* 中的同名值作兜底.
markets:
  a_share:
    enabled: true
    data_provider: baostock              # A 股: baostock 全量历史 + 总股本×收盘价市值
    benchmark: sh.000905                 # 中证500 (小盘股基准, 比沪深300更贴近庄股)
    fees:
      stamp_tax: 0.001                   # A 股印花税 (仅卖出)
    universe:
      market_cap_min_cny: 5_000_000_000
      market_cap_max_cny: 200_000_000_000
      exclude_st: true
      min_listed_days: 365
      min_price: 2.0

  hk_small:
    enabled: false                       # Phase 1-C 仅架构占位; Phase 1-D 接入 HK provider + 验证
    data_provider: hk_akshare            # 待实现: HK 小盘股 universe (akshare stock_hk_spot? yfinance?)
    benchmark: HSI                       # 恒生指数 (HK 小盘股缺乏标准基准, HSI 仅作 fallback)
    fees:
      stamp_tax: 0.0013                  # HK 印花税 0.13% (双边, 实际比 A 股复杂; 待验证)
    universe:
      market_cap_min_hkd: 1_000_000_000      # 占位: 10亿 HKD
      market_cap_max_hkd: 30_000_000_000     # 占位: 300亿 HKD
      exclude_st: false                       # HK 无 ST 制度, 但有"PIP"和"DPP"待排除
      min_listed_days: 365
      min_price: 0.5                          # HK 仙股门槛 (HKD)

data:
  cache_dir: ./data/cache
  daily_dir: ./data/prices               # 每只股票一个 {code}_daily.csv
  start_date: "2020-01-01"
  refresh_days: 1

strategy:
  # 最大持仓期（交易日）
  max_hold_days: 10                      # L4-combo4: 15→10，庄股拉升周期短，缩短窗口避免反向震荡

  # 仓位管理
  single_position_pct_max: 0.05          # fallback 等权值（L5 启用 tiered 后此值仅在 mode=fixed 时使用）
  position_max_count: 6                  # 同时持仓上限

  # L5-B: score 分级仓位（取代等权 5%）
  # score >=80 (高分): 8% / 75-80 (中): 5% / 70-75 (低): 3%
  # 6y 验证: Sharpe 1.627→1.806 (+0.18) / 收益 +48%→+76% / DD -3.1%→-4.9%
  position_size_mode: tiered
  tiered_score_thresholds: [75.0, 80.0]
  tiered_position_pcts: [0.03, 0.05, 0.08]

  # 吃货期积分阈值
  accumulation_score_entry: 70           # L1-E: 65→70，score >= 70（放宽位置后收紧score保证质量）
  accumulation_score_confirm: 75         # score >= 75 才可加仓确认
  entry_price_position_min: 0.4          # L1-E: 价格在近20d区间下0.4段即入场（0.5→0.4放宽）

  # 市场趋势过滤（熊市不入场）
  market_trend_filter: true              # 开启：指数MA60以上才允许入场
  market_trend_index: sh.000905         # 中证500（小盘股基准，比沪深300更贴近庄股）
  market_trend_ma: 60                   # MA周期

  # 入场过滤
  volume_spike_ratio_min: 2.0            # 放量倍数：当日成交量 >= 近20日均量 × 2.0
  consolidation_days_min: 10             # 横盘天数（高低振幅 <= 8%）达到 N 日
  consolidation_range_pct: 0.08          # 横盘振幅上限

  # 出场参数
  stop_loss_atr_mult: 1.5                # L4-combo4: 2.0→1.5 收紧 ATR 止损
  max_stop_loss_pct: 0.06                # 单笔最大止损上限6%（防止ATR过大导致止损过深）
  momentum_stop_pct: 0.05                # 06-10优化: 0.10→0.05，截断早期小幅亏损（反事实分析验证+4.5%）
  min_stop_distance_pct: 0.03            # 06-10优化v2: 0.05→0.03，对所有入场生效；防ATR过紧误扫低波股（反事实验证+7.3x收益）
  take_profit_pct: 0.10                  # 庄股拉升 10-12% 后高位放量出货
  distribution_turnover_thresh: 6.0      # 提早识别派发信号
  extend_hold_days: 25                   # 浮盈≥5%时最长持有延至25日
  extend_profit_pct: 0.05                # 触发延长的浮盈门槛（max_hold=10下少触发）
  dead_money_days: 999                   # 死钱退出禁用（反事实验证害>利）; 设为5启用

  # 入场增强过滤
  vol_ratio_entry_max: 2.0               # 06-10优化: gap 5%+ plus D日量>2x→派发信号拒绝入场（5笔avg-10.54%确定性亏损）

accumulation_weights:
  # 吃货期五维信号权重（总和须 = 1.0）
  # L6-A 落地 (2026-05-31): 6 hypothesis sweep + 6y verify 选 equal weights
  # - 3y Sharpe 1.44 (baseline) → 1.51 (equal), Δ+0.065
  # - 6y Sharpe 1.088 → 1.129, Δ+0.041 (双窗口同向 = 非过拟合)
  # - 组合层 v5 + equal: 2.347 → 2.365 Δ+0.018 (噪音级，sleeve vol 3.5% 被稀释)
  # equal 哲学: 无 prior weight → anti-overfit，5 维信号 alpha 大致均等
  ma_convergence: 0.20        # MA5/MA10/MA20 收敛程度（趋势趋平）
  volume_asymmetry: 0.20      # L6-A: 0.30 → 0.20 (vol 信号过载在 sweep 中证伪 -0.026 Sharpe)
  price_consolidation: 0.20   # 价格振幅收窄（横盘整理）
  turnover_decline: 0.20      # L6-A: 0.15 → 0.20 (浮筹信号略微上调)
  vp_divergence: 0.20         # L6-A: 0.15 → 0.20 (量价背离信号略微上调)

backtest:
  initial_capital: 1_000_000
  commission: 0.0003
  stamp_tax: 0.001
  slippage: 0.002             # 小票滑点适当放大
  output_dir: ./data/backtest
  benchmark_symbol: sh000300

  admission:
    min_sharpe: 0.15           # 06-10优化: 0.30→0.15（新基线Sharpe 0.19，8y含2018-2019拖累段）
    max_drawdown: 0.20         # 06-10优化: 0.30→0.20（新基线DD -10.3%）
    min_win_rate: 0.35         # 06-10优化: 0.40→0.35（新基线wr 35.6%，lottery-ticket结构少数大赢家）

# 组合层风控（与 equity_factor 06-04 同款；仅 alert，不自动平仓）
# 默认 enabled: false → daily_zhuang 永远输出 portfolio_alerts=[]，零回测/实盘行为差异；
# 实盘上线时改 enabled: true 即可生效。
# PR2 (2026-06-07): portfolio_drawdown_pct 接入真历史 peak DD (portfolio_history 表)。
portfolio_risk:
  # 2026-06-06 开启实盘风控:当前 3 仓位 (豫园/创维/长电力) 单只最大 33.8% > 0.30 应触发集中度告警
  enabled: true
  # 单只市值占组合 > 阈值 → 集中度告警
  # 建议初值 0.30（tiered sizing 上限 6% × 6 仓 = 36%，留 headroom）
  max_single_weight_pct: 0.30
  # 组合 unrealized_pnl_pct < 阈值（X 为负值）→ 账户层 stop alarm
  # 建议初值 -0.07（zhuang 6y 历史 sleeve DD ~ -7%）
  unrealized_pnl_floor_pct: -0.07
  # EXIT 信号占比 > 阈值 → 一半持仓同时退出, market panic 信号
  exit_signal_ratio_max: 0.50
  # 真历史 peak DD 阈值 (zhuang 6y sleeve 历史 ~-7%); 数据源 portfolio_history 表 (PR1 起累积)
  portfolio_drawdown_pct: -0.10
  drawdown_lookback_days: 60
