# Quant system config
# 中线策略 (20-60 日持仓)，A 股 + 港股，手动下单

markets:
  a_share:
    enabled: true
    universe: hs300        # 本项目仅支持 hs300
    benchmark: sh000300
    # --- L2 因子增强（v9）：加入 fcf_yield（每股自由现金流/收盘价）作为现金流质量因子 ---
    factors:
      weights:
        pe_inverse: 0.15
        pb_inverse: 0.10
        roe: 0.20
        revenue_growth: 0.15
        momentum_3m: 0.20
        fcf_yield: 0.20         # 新增（A 股 abstract 有「每股企业自由现金流量」字段）
    # --- L7-C3 出场优化（震荡/熊市 DD 防护）---
    # 用户反馈实盘套牢；L7-A/B Pullback 入场全失败 (Sharpe -0.16~-0.98)；
    # L7-C3 (E base + regime_exit + partial_exit + hold30) 4y 2022-2026:
    #   Sharpe 0.23→0.62 (+174%) / 收益 +17.7%→+38.5% / DD -19.5%→-14.3% / 胜率 41.4%→50.3%
    # 8y 2018-2026: Sharpe 0.53→0.40 (牛市略输), DD -18.5%→-14.8% (DD 始终改善).
    # trade-off: 牛市 baseline 占优；震荡熊市 C3 占优；当前 2022-2026 模式适用.
    timing:
      atr_stop_mult: 1.5          # L7-E: 2.0→1.5 收紧 ATR 止损
      atr_target_mult: 3.0        # L7-E: 4.0→3.0 早锁利 (TP 触发频率↑)
      max_hold_days: 30           # L7-E: 60→30 短持仓 (周转率↑, Sharpe↑)
      m5_regime_exit_enabled: true  # L7-E4: HS300<MA60 强制平仓 (DD 改善的关键)
      partial_exit_enabled: true    # L7-C2: TP 触发卖 50% + 剩余切宽松 trail (胜率↑)
      partial_exit_pct: 0.5
      partial_exit_trail_mult: 1.5
    # 北向资金信号实验：基础设施已就绪（loader.get_a_share_northbound_flow），
    # 但 vol_relax 在 A 股拉入弱候选（v6 Sharpe 0.63→0.53），RSI 上沿放宽零效果（v7=v5）
    # 当前框架下北向信号对 A 股无价值，禁用（保留 loader 代码备未来使用）
    # --- L3：on-regime HS300 做空 overlay（HK 验证 +0.13；A 股初测 +0.05）---
    hedge:
      ratio: 0.3
      ma_days: 60
      borrow_cost: 0.03

  hk_share:
    enabled: true
    # 恒生 HSCHK100（恒生中国内地企业(香港上市)100）；成份与行情须来自恒生公开资料或订阅数据产品
    universe: hs100
    benchmark: HSCHK100
    # --- 港股适配：MA200 门控（6年熊市中MA60近乎永远关门）+ 深度折价入场 ---
    timing:
      m2_regime_ma_days: 200      # 用 MA200 识别主趋势（MA60 在长熊中噪声太多）
      rsi_entry_low: 40.0         # 接受更深的超卖入场（港股折价修复逻辑）
      rsi_entry_high: 72.0
      ma_long: 80                 # 更长趋势均线，减少港股低流动性带来的误穿
      max_hold_days: 80           # 港股中线持仓稍长
      # --- L1：放宽 trail + TP runner（让赢家奔跑）---
      # 基线 v1: atr_stop_mult=2.0, atr_target_mult=4.0, runner 全关 → Sharpe 0.42 (trail 主导,47 笔 TP 砍早)
      atr_stop_mult: 2.5          # 加宽基础 trail（港股波动大，2×ATR 经常被随机噪声触发）
      atr_target_mult: 5.0        # 略提高 TP 阈值（first lock-in 节点更高）
      tp_runner_enabled: true     # TP 命中后不全平，启动 runner 模式
      atr_stop_mult_runner: 2.0   # runner 阶段 trail 收紧到 2×（锁利但保留上行空间）
      tp_runner_lock_atr_mult: 1.0  # promote 时把 stop 拉到 target - 1×ATR（锁定约 4×ATR 收益）
      # --- L2-B：南向资金信号联动（HK 通过港股通南向净买入识别边际买盘）---
      m3_southbound_widen_enabled: true
      m3_southbound_ma_window: 20
      m3_southbound_threshold: 2.0     # 严格阈值：仅 today_net_buy > 3×MA20 时触发（top 10% 强买日）
      m3_southbound_widen_lo_pts: 3.0
      m3_southbound_widen_hi_pts: 3.0
      m3_southbound_vol_relax: 0.2     # 1.5× → 1.2×（仍要求量能确认，但宽松）
    factors:
      weights:
        # L2-A：HK 财务数据接入 stock_financial_hk_analysis_indicator_em（90 天披露滞后）
        # 2018-2026 期间 HK 价值股（H 股银行）跑输动量股 → drop value，保留 quality + momentum
        pe_inverse: 0.0             # 价值陷阱：H 股银行长期破净但不修复
        pb_inverse: 0.0
        roe: 0.30                   # 质量过滤 — 避开僵尸国企
        revenue_growth: 0.10        # 成长
        momentum_3m: 0.30           # 主信号
        momentum_6m: 0.30           # 主信号
    # --- L3：HSCHK100 做空对冲 overlay；仅 regime ON 时维持，避免熊市反弹打损 ---
    # 分析显示纯多头策略 beta=0.155 已很低，但 on-regime hedge 仍能拉 Sharpe 0.52→0.78
    hedge:
      ratio: 0.3                    # 做空规模 = initial_capital × ratio（轻仓对冲，减少借券成本）
      ma_days: 200                  # 用基准 MA200 判定 regime（与策略 m2_regime_ma_days 对齐）
      borrow_cost: 0.03             # 年化借券成本估算（HK 指数 ETF/期货约 2-4%）

  us_share:
    # ⚠️ DEPRECATED FOR PRODUCTION (2026-05-15)
    # 8 年回测 Sharpe -0.05，总收益 +6.98% vs QQQ 被动 +241%（超额 -317pp）
    # 根本原因：NASDAQ100 = MAG7 集中市场，均权 momentum 策略无法 capture 集中度 alpha
    # 实盘用 QQQ ETF 被动持有替代（详见 memory/three_universe_2026-05.md）
    # 本配置保留供研究 / 后续因子实验；daily_run 不应跑此市场
    enabled: false               # 改为 false 防止 daily_run 误用（如需研究改回 true）
    universe: nasdaq100    # NASDAQ 100（QQQ 成份）
    benchmark: NDX         # QQQ ETF 作 NDX 基准代理
    # --- 美股适配 v3：仅保留 MA200 门控（ma_long 回归默认 60）---
    timing:
      m2_regime_ma_days: 200      # MA200 是美股牛熊的标准分界线（唯一保留的覆盖）
      rsi_entry_low: 50.0
      rsi_entry_high: 78.0        # 关键：NASDAQ 动量股 RSI 70-80 时往往仍在上涨
      rsi_overbought: 85.0        # 延迟超买出场，避免过早离场强势股
      max_hold_days: 150          # 让利润奔跑（AI 超级周期需要 3-5 个月持仓）
      atr_target_mult: 6.0        # 更高止盈目标（NASDAQ 动量股有更大上行空间）
      m2_rsi_atr_k: 200.0         # 降低 ATR 对 RSI 带的扰动
      m2_structure_lookback: 30   # 更长的结构突破窗口
    factors:
      weights:
        pe_inverse: 0.0           # 高 PE 成长股，估值因子反效（NVDA PE 50 仍暴涨）
        pb_inverse: 0.0
        roe: 0.0
        revenue_growth: 0.0
        momentum_3m: 0.50         # 短动量：入场时机
        momentum_6m: 0.50         # 中动量：趋势强度（NASDAQ 超级周期的核心信号）

data:
  cache_dir: ./data/cache
  start_date: "2022-01-01"
  refresh_days: 1          # 缓存超过 N 天则重新拉取
  price_adjust: ""         # qfq(前复权) / hfq(后复权) / ""(不复权=raw; 更严格避免复权带来的未来信息)

  # 美股数据源（NASDAQ 100）；见 scripts/prefetch_us_universe.py
  us_market:
    daily_dir: "./data/us_prices"                    # 每只股票一个 {ticker}.csv，列: date,open,high,low,close,volume
    index_daily_csv: "./data/us_prices/NDX_index.csv"  # QQQ ETF 日线（akshare 预取）
    constituents_csv: "./data/us_prices/nasdaq100_constituents.csv"  # 成份股列表，列: code,name

  # 恒生指数公司数据源（港股 hs100 / HSCHK100 基准）；见 quant_system/data/hang_seng_indexes.py
  hang_seng_indexes:
    full_constituents_csv: ""           # 可选：订阅《指数数据产品》全量成份 CSV 路径
    allow_factsheet_top50_only: true    # true：仅用官网英文 factsheet 内 TOP 50（研究）；完整 100 请配 full_constituents_csv 并置 false
    official_factsheet_pdf_en: ""       # 可选：覆盖默认 HSCHK100 英文 factsheet URL
    hk_constituent_daily_dir: "./data/hk_prices"          # akshare 预取，见 scripts/prefetch_hk_universe.py
    hschk100_index_daily_csv: "./data/hk_prices/HSCHK100_index.csv"  # HSML100 指数日线（akshare 预取）

strategy:
  hold_days_min: 20
  hold_days_max: 60
  position_max_count: 10           # 同时持仓最多 N 只
  single_position_pct_max: 0.20    # 单只最大仓位（v5：从 0.15 提到 0.20 提升资金利用率）
  cash_buffer_pct_min: 0.10        # 最低现金占比

  # 择时 + M2（字段必须被 timing_config_from_yaml_node 识别；未知键忽略）
  timing:
    # --- M2 市况门（指数）；与 backtest.benchmark_symbol 对齐，由 BottomupTimingStrategy 外层拦截新仓 ---
    m2_regime_enabled: true
    m2_regime_ma_days: 60
    # --- M2 单票：RSI 带宽随 ATR% 微调、可选收阳/中位量、结构突破 ---
    m2_rsi_atr_adjust: true
    m2_rsi_atr_k: 400.0
    m2_rsi_atr_cap: 8.0
    m2_vol_green_bar: false
    m2_vol_median_lookback: 5
    m2_vol_median_mult: 1.0          # <=1 关闭「相对近端中位量」约束
    m2_structure_lookback: 20        # 收盘需不低于前 N 日最高收盘(含 eps 缓冲)
    m2_structure_eps: 0.002

    # --- Level 3：突破+量能入场（替换 MA20/60 金叉）---
    m2_breakout_mode: false          # v8 全段 FAIL (Sharpe 0.21)，回滚到 MA20/60金叉
    m2_breakout_ma_trend: true       # 突破时仍要求 close > MA60（趋势门）
    vol_breakout_mult: 1.3           # 量能门槛放宽（突破+量，不必要求 1.5x）

    # --- M3：RSI 入场带与指数市况/波动联动 + 慢周期 RSI（默认关；与 m2_regime_ma_days / 基准指数对齐）---
    m3_regime_rsi_band: false
    m3_reg_rsi_lo_widen_pts_per_ma_gap_1pct: 1.5   # 指数高于 SMA 时，每 1 个百分点 gap 放宽 RSI 下沿的点数
    m3_reg_rsi_lo_widen_cap: 8.0
    m3_reg_vol_tighten_hi: false
    m3_reg_vol_hi_tighten_k: 18.0
    m3_reg_vol_hi_tighten_cap: 6.0
    m3_reg_index_atr_pct_median_window: 20

    m3_mtf_rsi_enabled: false
    m3_mtf_rsi_period: 28
    m3_mtf_rsi_min: 48.0

    # --- M5：持仓评估时若技术出场未触发，指数市况门不通过则强制平仓（与 m2_regime_* / 基准一致）---
    m5_regime_exit_enabled: false

    # --- M5 部分出场：ATR 止盈触发 → 出场 50%，剩余切换到 1.5× 更宽松 trailing stop ---
    partial_exit_enabled: false         # true 启用；false = 原全量出场逻辑
    partial_exit_pct: 0.5              # 首次止盈出场比例
    partial_exit_trail_mult: 1.5       # 剩余仓位 trailing stop 倍数扩展（×atr_stop_mult）

# 多因子权重 (用于自下而上打分，模块: bottomup/factors.py)
factors:
  weights:
    pe_inverse: 0.0        # 已关闭 (A股 PE 可调节，信噪比低)
    pb_inverse: 0.25       # 估值: 1/PB（A股折价修复信号）
    roe: 0.30              # 质量: ROE
    revenue_growth: 0.0    # 已关闭
    momentum_3m: 0.25      # 动量: 3 个月涨幅
    fcf_yield: 0.0         # 已关闭 (A股财报延迟+金融股NaN，信噪比低，v6实验验证)
    rev_accel: 0.0         # 已关闭 (同上，v6实验验证)

  # M4：因子离散度 / 换手惩罚 / 回测组合约束（字段由 m4_config_from_yaml 读取）
  m4:
    m4_enabled: true
    m4_factor_dispersion_lambda: 0.0   # >0：按截面 z 标准差惩罚总分（因子间分歧大则降权）
    m4_turnover_penalty: 0.0           # >0：非「上一屏 topN」内的命中扣分后重排
    m4_turnover_top_n: 30
    m4_max_same_industry: 3            # >0：持仓+待买+当日新选中同行业上限（需 industry 映射）
    m4_new_risk_budget_frac: 0.0       # >0：当日新入选信号 (entry-stop)/entry 之和上限

journal:
  db_path: ./data/journal.db

backtest:
  initial_capital: 1000000        # 初始资金 100 万
  commission: 0.0003              # 佣金率 (双边)
  stamp_tax: 0.001                # 印花税 (仅卖出)
  slippage: 0.001                 # 单边滑点
  cash_buffer_pct: 0.05           # 留 5% 现金缓冲
  benchmark_symbol: sh000300      # HS300 基准
  output_dir: ./data/backtest

  # 准入门槛 (实盘前必须通过)
  admission:
    min_sharpe: 0.5
    min_sortino: 0.7          # Sortino 门槛（仅惩罚下行波动，比 Sharpe 要求更高）
    max_drawdown: 0.25
    min_win_rate: 0.40
