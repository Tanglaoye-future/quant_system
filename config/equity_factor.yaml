# Quant system 入口配置 — equity_factor 子策略包
# Phase 1a 重构（2026-05-22）：策略与市场解耦
#   - 算法层（timing/factors.weights/hedge/admission）→ config/strategies/*.yaml
#   - 市场层（universe/benchmark/数据源）→ config/markets/*.yaml
#   - 账户层（资金/费率/m4/账户上限）→ 本文件（跨策略共享）
# 装配 loader 在 src/quant_system/config.py 把策略+市场合成旧的 markets.<m>.* dict 结构，
# scripts/backtest.py 与 daily_*.py 完全不感知变化（Phase 1b 再翻转入口签名）

strategies:
  - strategies/equity_momentum.yaml        # A 股 L7-C3 (a_share)
  - strategies/equity_hk_momentum.yaml     # 港股 L1+L2-B (hk_share)
  - strategies/equity_us_momentum.yaml     # 美股 NASDAQ100 deprecated (us_share, disabled)
  - strategies/equity_sp500_momentum.yaml  # 美股 SP500 quality+momentum (us_share/sp500)

markets:
  - markets/a_share.yaml
  - markets/hk_share.yaml
  - markets/us_share.yaml

# ----------- 账户层（跨策略共享）-----------

data:
  cache_dir: ./data/cache
  start_date: "2022-01-01"
  refresh_days: 1
  price_adjust: ""         # qfq(前复权) / hfq(后复权) / ""(不复权=raw)

strategy:
  hold_days_min: 20
  hold_days_max: 60
  position_max_count: 10           # 同时持仓最多 N 只
  single_position_pct_max: 0.20    # 单只最大仓位
  cash_buffer_pct_min: 0.10
  # 全局 timing 默认 — 留空，让 build_strategy 的 merge({**global, **mkt}) 走市场覆盖
  timing: {}

# ----------- 组合层风控 alerts（仅警告，不自动平仓） -----------
# 默认 enabled: false → 完全 noop；个股层 EXIT/HOLD 决策不受影响。
# 上线时改 enabled: true 并按账户规模/风险偏好调阈值。任一阈值留 null = 该项禁用。
# 触发后日报「组合摘要」段 ⚠ 红字 + dashboard 顶部 banner，由用户决定是否手动减仓。
# PR2 (2026-06-07): portfolio_drawdown_pct + drawdown_lookback_days 接入真历史 peak DD
# (数据源 portfolio_history 表)。默认 None / 60 d 即可。
portfolio_risk:
  enabled: false
  max_single_weight_pct: 0.30      # 单只市值占比上限（当前 601066 ≈ 26.3%）
  unrealized_pnl_floor_pct: -0.05  # 组合层未实现浮盈下限（账户层 stop alarm）
  exit_signal_ratio_max: 0.50      # 同时 EXIT 信号笔数 / 持仓笔数 上限
  portfolio_drawdown_pct: -0.08    # 真历史 peak DD 阈值（v5 历史 -7.94% 留 headroom）
  drawdown_lookback_days: 60       # peak 计算窗口

# 全局 factors — weights 留空（让 merge 走市场），m4 保留跨策略共享
factors:
  weights: {}
  m4:
    m4_enabled: true
    m4_factor_dispersion_lambda: 0.0
    m4_turnover_penalty: 0.0
    m4_turnover_top_n: 30
    m4_max_same_industry: 3
    m4_new_risk_budget_frac: 0.0

journal:
  db_path: ./data/journal.db

backtest:
  initial_capital: 1000000        # 初始资金 100 万
  commission: 0.0003              # 佣金率 (双边)
  stamp_tax: 0.001                # 印花税 (仅卖出；us_share 由 backtest.py 强制归 0)
  slippage: 0.001                 # 单边滑点
  cash_buffer_pct: 0.05           # 留 5% 现金缓冲
  benchmark_symbol: sh000300      # 全局 fallback (markets/<m>.benchmark 优先)
  output_dir: ./data/backtest
  admission:
    min_sharpe: 0.5
    min_sortino: 0.7
    max_drawdown: 0.25
    min_win_rate: 0.40
