# Quant system 入口配置 — options 子策略包
# Phase 1-A 重构（2026-05-25）：策略与市场解耦
#   - 算法层（iv 阈值/entry/exit/momentum/signal_grades）→ config/strategies/options_bull_call_spread.yaml
#   - 市场层（underlying/vol_proxy/exchange/currency/multiplier）→ config/markets/{us_qqq, hk_hsi}.yaml
#   - 账户/broker 层（IBKR 连接 + 风险预算）→ 本文件（跨策略共享）
# 装配 loader 在 src/quant_system/config.py 把策略+市场合成 markets.<m>.* dict 结构

strategies:
  - strategies/options_bull_call_spread.yaml

markets:
  - markets/us_qqq.yaml
  - markets/hk_hsi.yaml         # Phase 1-A 占位；strategy deployment 默认未启用此 market

# ----------- 账户/Broker 层（跨策略共享）-----------

broker:
  host: 127.0.0.1
  port: 4001          # IBKR Gateway 实盘端口
  paper_port: 4002    # 模拟盘端口（--paper 启用）
  client_id: 10
  timeout_sec: 20

account:
  risk_per_trade_pct: 0.03      # 每笔风险 3%
  max_concurrent_positions: 5   # 最多同时 5 个方向
