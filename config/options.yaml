# options_system — QQQ Bull Call Spread 期权策略
# 账户：IBKR Gateway，Reg T Margin，~$13,700

broker:
  host: 127.0.0.1
  port: 4001          # Gateway 实盘；模拟盘改 4002
  client_id: 10
  timeout_sec: 20

account:
  risk_per_trade_pct: 0.03      # 每笔风险 3%（~$411）
  max_concurrent_positions: 5   # 最多同时 5 个方向
  currency: USD

strategy:
  underlying: QQQ
  exchange: SMART

  # IV 引擎（用 VXN 作 QQQ 隐含波动率代理）
  iv_engine:
    vxn_ticker: "^VXN"
    ivr_lookback_days: 252      # 52 周
    ivr_low: 25                 # IVR < 25 → Low IV mode（便宜，买方优先）
    ivr_high: 50                # IVR > 50 → High IV mode（贵，等待或超紧价差）

  # 入场参数（Bull Call Spread）
  entry:
    dte_min: 40
    dte_max: 65
    long_leg_delta: 0.45        # 买入腿目标 Delta
    short_leg_delta: 0.27       # 卖出腿目标 Delta
    min_spread_width_pct: 0.025 # 最小价差宽度 = 标的价格 × 2.5%（约 $12）
    max_bid_ask_pct: 0.06       # 单腿 bid-ask 超过 mid × 6% → 流动性不足，跳过

  # 出场参数
  exit:
    profit_target_mult: 2.0     # 权利金翻倍 → 止盈
    stop_loss_mult: 0.50        # 亏损 50% → 止损
    dte_warning: 21             # 剩余 21 DTE → 提醒评估滚仓

  # QQQ 动量门控
  momentum:
    ma_period: 200
    rsi_period: 14
    rsi_entry_low: 50.0
    rsi_entry_high: 78.0
    lookback_days: 300

  # 信号评级（综合 IV + 动量）
  signal_grades:
    A: {ivr_max: 25, label: "强烈买入 — 期权便宜+动量强"}
    B: {ivr_max: 40, label: "买入 — 价差控成本"}
    C: {ivr_max: 50, label: "观望 — 权利金偏贵"}
    D: {ivr_min: 50, label: "跳过 — 期权过贵"}
