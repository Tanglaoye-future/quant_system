# 市场环境配置 — 美股 NASDAQ100
# ⚠️ DEPRECATED FOR PRODUCTION (2026-05-15)；详见 memory/three_universe_2026-05.md
# 保留供研究 / 后续因子实验；daily_run 不应跑此市场（策略文件 enabled: false）

name: us_share
universe: nasdaq100
benchmark: NDX
regime_benchmark: NDX
universe_filter: none
industry_concentration: false     # US 无 industry_map 数据，关闭 M4 行业约束

fees:
  stamp_tax: 0.0                  # 美股无印花税

data:
  us_market:
    # NASDAQ 100 (默认 universe)
    daily_dir: "./data/us_prices"
    index_daily_csv: "./data/us_prices/NDX_index.csv"
    constituents_csv: "./data/us_prices/nasdaq100_constituents.csv"
    # SP500 (DataLoader.us_universe="sp500" 时启用)
    sp500_daily_dir: "./data/sp500_prices"
    sp500_index_daily_csv: "./data/sp500_prices/SPX_index.csv"
    sp500_constituents_csv: "./data/sp500_prices/sp500_constituents.csv"
    # 全美股 (DataLoader.us_universe="all" 时启用)
    us_all_daily_dir: "./data/us_prices_all"
    # fundamentals via yfinance: 5 年年度 (income/balance/cashflow)，2018-2020 段缺失
    # 备选 provider: akshare_em (stock_financial_us_analysis_indicator_em)，未实现
    fundamentals_provider: yfinance
    fundamentals_publication_lag_days: 60   # SEC 10-K large accelerated filer 上限
