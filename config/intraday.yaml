# 盘中实时风控配置 — PR5 of docs/specs/position_v2_harness.md §6
# 用户授权 2026-06-07: Telegram bot + 15 min + 4 阈值
#
# 默认 enabled: false → 不跑任何东西。要启用：
#   1. 设 TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID 环境变量
#   2. 改下面 enabled: true + channels.telegram.enabled: true
#   3. launchd 因 macOS TCC 阻塞 (见 session_2026_05_27.md), 用 nohup 后台守护:
#      nohup venv/bin/python scripts/intraday/intraday_risk_check.py --loop &
#
# 触发条件 (任一即推):
# - 个股层: 现价 < stop_loss → "break_stop_loss"           (PR1 新增, critical)
# - 个股层: 现价 < MA60 → "break_ma60"                     (PR1 新增, critical)
# - 个股层: 现价距 stop_loss 阈值 < proximity_to_stop_loss_pct → "stop_loss_proximity"
# - 个股层: 现价距 take_profit 阈值 < proximity_to_take_profit_pct → "take_profit_proximity"
# - 组合层: unrealized_pnl_pct < portfolio_unrealized_floor_pct → "portfolio_unrealized_floor"
# - 组合层: drawdown_from_peak_pct < portfolio_drawdown_pct → "portfolio_peak_drawdown"
# - 候选股: current > T 日 high × (1+margin) + 量比 ≥ vol_ratio_min → "daily_screen_breakout"
#          (PR2 新增, warning, 入场提示 — daily 跑完写 data/intraday/equity_watchlist.json,
#           intraday 读取后 5min 监控)

intraday_alerts:
  enabled: true                      # 2026-06-08 用户启动全套服务时翻开
  poll_interval_minutes: 5           # PR1: 15→5 min（pr1_intraday_5min_breach.md）
  trading_window:
    a_share:                         # A 股交易时段（local time, 9:30-15:00；中午 11:30-13:00 休市）
      start: "09:30"
      lunch_start: "11:30"
      lunch_end: "13:00"
      end: "15:00"

  channels:
    telegram:
      enabled: true                  # 凭证从 env 读 (TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID)
      timeout_sec: 10

  triggers:
    # 个股层阈值（绝对值，0.005 = 0.5%）
    proximity_to_stop_loss_pct: 0.005
    proximity_to_take_profit_pct: 0.005
    # 组合层阈值（X 为负值；浮亏低于阈值即触发）
    portfolio_unrealized_floor_pct: -0.05
    portfolio_drawdown_pct: -0.07
    # 评估哪些策略（默认全部 enabled 的 open_trade 走一遍）；空 list = 全部
    strategies: []

# PR2: 候选股盘中突破入场提示
#   daily_equity 跑完写 data/intraday/equity_watchlist.json；
#   intraday cron 读 watchlist 后 5min 监控突破；
#   触发后推送「可考虑次日开盘建仓」，**不自动下单** (Backstop #4)
breakout:
  enabled: true                        # 默认开；若想关掉只看持仓告警，改 false
  breakout_margin: 0.005               # current > ref_high × (1 + margin)
  vol_ratio_min: 1.2                   # 量比下限；akshare 缺失字段降级 skip 该 filter
  watchlist_max_age_days: 5            # asof_date 超过 N 自然日视 stale，noop
  strategies: ["equity_factor"]        # PR2 仅 equity_factor；zhuang 留 PR3

# PR3: zhuang 庄股盘中派发预警
#   持仓 zhuang 股盘中今日大涨 (≥ 4%) + 量比放大 (≥ 2.0) →
#   庄家可能进入派发期，推送 "考虑减仓" (非自动平仓, Backstop #4)
zhuang_distribution:
  enabled: true                        # 默认开
  change_pct_min: 0.04                 # 今日涨幅下限 (小数, 0.04 = 4%)
  vol_ratio_min: 2.0                   # 量比下限；缺失保守降级仍发 alert
  strategies: ["zhuang"]               # 只对 strategy_name 在此列表内的持仓评估
