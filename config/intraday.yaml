# 盘中实时风控配置 — PR5 of docs/specs/position_v2_harness.md §6
# 用户授权 2026-06-07: Telegram bot + 15 min + 4 阈值
#
# 默认 enabled: false → 不跑任何东西。要启用：
#   1. 设 TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID 环境变量
#   2. 改下面 enabled: true + channels.telegram.enabled: true
#   3. launchd 因 macOS TCC 阻塞 (见 session_2026_05_27.md), 用 nohup 后台守护:
#      nohup venv/bin/python scripts/intraday/intraday_risk_check.py --loop &
#
# 触发条件 (任一即推):
# - 个股层: 现价 < stop_loss → "break_stop_loss"           (PR1 新增, critical)
# - 个股层: 现价 < MA60 → "break_ma60"                     (PR1 新增, critical)
# - 个股层: 现价距 stop_loss 阈值 < proximity_to_stop_loss_pct → "stop_loss_proximity"
# - 个股层: 现价距 take_profit 阈值 < proximity_to_take_profit_pct → "take_profit_proximity"
# - 组合层: unrealized_pnl_pct < portfolio_unrealized_floor_pct → "portfolio_unrealized_floor"
# - 组合层: drawdown_from_peak_pct < portfolio_drawdown_pct → "portfolio_peak_drawdown"
# - 候选股: current > T 日 high × (1+margin) + 量比 ≥ vol_ratio_min → "daily_screen_breakout"
#          (PR2 新增, warning, 入场提示 — daily 跑完写 data/intraday/equity_watchlist.json,
#           intraday 读取后 5min 监控)

intraday_alerts:
  enabled: true                      # 2026-06-08 用户启动全套服务时翻开
  poll_interval_minutes: 5           # PR1: 15→5 min（pr1_intraday_5min_breach.md）
  trading_window:
    a_share:                         # A 股交易时段（local time, 9:30-15:00；中午 11:30-13:00 休市）
      start: "09:30"
      lunch_start: "11:30"
      lunch_end: "13:00"
      end: "15:00"

  channels:
    telegram:
      enabled: true                  # 凭证从 env 读 (TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID)
      timeout_sec: 10

  triggers:
    # 个股层阈值（绝对值，0.005 = 0.5%）
    proximity_to_stop_loss_pct: 0.005
    proximity_to_take_profit_pct: 0.005
    # 组合层阈值（X 为负值；浮亏低于阈值即触发）
    portfolio_unrealized_floor_pct: -0.05
    portfolio_drawdown_pct: -0.07
    # 评估哪些策略（默认全部 enabled 的 open_trade 走一遍）；空 list = 全部
    strategies: []

# PR2: 候选股盘中突破入场提示
#   daily_equity 跑完写 data/intraday/equity_watchlist.json；
#   intraday cron 读 watchlist 后 5min 监控突破；
#   触发后推送「可考虑次日开盘建仓」，**不自动下单** (Backstop #4)
breakout:
  enabled: true                        # 默认开；若想关掉只看持仓告警，改 false
  breakout_margin: 0.005               # current > ref_high × (1 + margin)
  vol_ratio_min: 1.2                   # 量比下限；akshare 缺失字段降级 skip 该 filter
  watchlist_max_age_days: 5            # asof_date 超过 N 自然日视 stale，noop
  strategies: ["equity_factor"]        # PR2 仅 equity_factor；zhuang 留 PR3

# PR10 (2026-06-17): CB 双低 sleeve 实时风控
#   持仓 CB 个券 close < 85 → cb_break_stop_loss (债底击穿, critical)
#   持仓 CB 个券 last_trading_date 在 30 天内 → cb_redeem_imminent (强赎临近, critical)
#   评估 → AlertEvent → alerts_sent 去重 → Telegram 推送 (与 equity 同管道)
#
#   不做 dual_low_score>180 实时告警 — 慢信号已被 PR9 daily rebalance signal 覆盖,
#   实时拉 conversion_premium_rate 成本 (panel value_analysis 每 code 1 次 API) 不划算.
#
#   CB 不做 T+0 — 北极星 risk-parity 豁免 (Backstop #4), 告警仅 "考虑减仓" advisory.
cb_double_low:
  enabled: true                        # 与 intraday_alerts.enabled 同步开关
  poll_interval_minutes: 15            # CB 低波 + 月度 rebalance, 不需要 equity 的 5 min 节奏
  redeem_within_days: 30               # 强赎临近窗口 (天数)
  # stop_loss_close 不在此处定义, 从 config/cb_double_low.yaml strategy.stop_loss_close 读 (单源)

# PR3: zhuang 庄股盘中派发预警
#   持仓 zhuang 股盘中今日大涨 (≥ 4%) + 量比放大 (≥ 2.0) →
#   庄家可能进入派发期，推送 "考虑减仓" (非自动平仓, Backstop #4)
zhuang_distribution:
  enabled: false                       # [DEPRECATED 2026-06-14] zhuang 子策略弃用，告警逻辑随同关闭
  change_pct_min: 0.04                 # 今日涨幅下限 (小数, 0.04 = 4%)
  vol_ratio_min: 2.0                   # 量比下限；缺失保守降级仍发 alert
  strategies: ["zhuang"]               # 只对 strategy_name 在此列表内的持仓评估

# 持仓中日内做 T 信号 (spec docs/specs/intraday_t_execution_a_share.md)
# 北极星支柱 3 后半段 — A 股 advisory only, PR1-5 不下单 (Backstop #4)
# 6 条不变量见 spec §14; 24 case 测试 tests/intraday/test_t_signals.py
#
# 默认 enabled: false → 零行为差异 (即使 daily 跑也不发 T 信号)
# 启用步骤:
#   1. 设 TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID
#   2. 改 t_signals.enabled: true
#   3. nohup venv/bin/python scripts/intraday/intraday_t_signals.py --loop &
t_signals:
  enabled: true                        # 2026-06-15 用户授权试跑 advisory v1
  # 白名单: 与 journal_trades.strategy 实际值对齐 (非包名 equity_factor);
  # zhuang / mean_reversion / equity_hk_momentum / equity_sp500_momentum 不入,
  # PR1 只覆盖 A 股 a_mom (即 equity_momentum). HK / US 扩展走后续 PR.
  strategies: ["equity_momentum"]
  markets: ["a_share"]                 # PR1 only A 股; HK/US 不在 scope
  trading_window:
    start: "09:30"
    lunch_start: "11:30"
    lunch_end: "13:00"
    end: "15:00"
    skip_first_minutes: 5              # 跳开盘集合竞价噪声
  poll_interval_minutes: 5

  # §3.1 价格网格 base
  grid:
    sell_unrealized_pct_min: 0.05      # 浮盈 ≥ 5% 触发 SELL
    buy_unrealized_pct_min: 0.02       # 浮盈 ∈ [2%,5%) 触发 BUY (必须当日已有 SELL)
    no_t_unrealized_pct_max: -0.03     # 浮亏 ≤ -3% 全面禁用 T
    qty_ratio_base: 0.5

  # §3.2 VWAP 偏离 boost
  vwap:
    enabled: true
    sell_premium_pct: 0.02             # 价 > VWAP × 1.02 → SELL qty +0.2
    buy_discount_pct: 0.015            # 价 < VWAP × 0.985 → BUY qty +0.2
    qty_ratio_boost: 0.2

  # §3.3 量价 anti-distribution
  vol_price:
    enabled: true
    sell_suppress_change_pct: 0.04     # day_change ≥ 4% + vol_ratio ≥ 2 → SELL qty ×0.7
    sell_suppress_vol_ratio: 2.0
    sell_suppress_factor: 0.7
    buy_boost_change_pct: -0.02        # day_change ≤ -2% + vol_ratio ≤ 0.7 → BUY qty ×1.3
    buy_boost_vol_ratio: 0.7
    buy_boost_factor: 1.3

  # 不变量 #2 — qty clamp
  qty_ratio_clamp:
    min: 0.2                            # 永不卖光底仓 (留 ≥ 30%)
    max: 0.7                            # 永不超 70% 调仓

  # 不变量 #1 — 频率上限 (A 股合规当日净持仓量不变)
  frequency:
    max_sells_per_day: 1
    max_buys_per_day: 1
