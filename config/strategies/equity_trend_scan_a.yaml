# 策略：A 股全市场趋势扫描（纯量价信号）
# 2026-06-12 新建：从 equity_momentum (hs300限定) 扩展为全 A 股扫描
# 对比 equity_momentum 的 key diff:
#   - universe: all (全 A 股，非 hs300)
#   - pure_price_volume: true — 跳过所有基本面数据拉取，仅用 4 个量价信号打分
#   - 其余 timing 参数沿用 L9-A 已验证配置

name: equity_trend_scan_a
kind: bottomup_timing

deployments:
  - market: a_share
    universe: all
    enabled: false               # 2026-06-14 证伪: 8y Sharpe -0.90 / DD -74.62% / vs HS300 -79.12% 灾难级
    capital_pct: 0.00

# --- 算法层 ---

timing:
  m2_regime_enabled: true
  m2_regime_ma_days: 60
  m2_rsi_atr_adjust: true
  m2_rsi_atr_k: 400.0
  m2_rsi_atr_cap: 8.0
  m2_vol_green_bar: false
  m2_vol_median_lookback: 5
  m2_vol_median_mult: 1.0
  m2_structure_lookback: 20
  m2_structure_eps: 0.002
  m2_breakout_mode: false
  m2_breakout_ma_trend: true
  vol_breakout_mult: 1.3
  m3_regime_rsi_band: false
  m3_reg_rsi_lo_widen_pts_per_ma_gap_1pct: 1.5
  m3_reg_rsi_lo_widen_cap: 8.0
  m3_reg_vol_tighten_hi: false
  m3_reg_vol_hi_tighten_k: 18.0
  m3_reg_vol_hi_tighten_cap: 6.0
  m3_reg_index_atr_pct_median_window: 20
  m3_mtf_rsi_enabled: false
  m3_mtf_rsi_period: 28
  m3_mtf_rsi_min: 48.0
  atr_stop_mult: 1.5
  atr_target_mult: 3.0
  max_hold_days: 30
  m5_regime_exit_enabled: true
  partial_exit_enabled: true
  partial_exit_pct: 0.5
  partial_exit_trail_mult: 1.5
  partial_exit_regime_filter: true
  partial_exit_regime_ma_days: 200

factors:
  pure_price_volume: true
  weights: {}

hedge:
  ratio: 0.3
  ma_days: 60
  borrow_cost: 0.03

admission:
  min_sharpe: 0.3
  min_sortino: 0.4
  max_drawdown: 0.30
  min_win_rate: 0.35
