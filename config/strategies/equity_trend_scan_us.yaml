# 策略：美股全市场趋势扫描（纯量价信号）
# 2026-06-12 新建：替代失败的 SP500/NASDAQ100 momentum
# SP500 4y Sharpe -0.18 / NASDAQ100 8y Sharpe -0.05 → 纯量价重新做
# key diff from equity_sp500_momentum:
#   - universe: all (全美股)
#   - pure_price_volume: true — 去掉了 ROE/PE/FCF 等基本面因子
#   - 更短持仓周期（美股动量衰减快）

name: equity_trend_scan_us
kind: bottomup_timing

deployments:
  - market: us_share
    universe: all
    enabled: false               # 2026-06-14 证伪: 8y Sharpe -0.23 / DD -38.47% / vs SPX 大幅落后
    capital_pct: 0.00

# --- 算法层 ---

timing:
  m2_regime_enabled: true
  m2_regime_ma_days: 200         # MA200 是美股牛熊标准
  rsi_entry_low: 50.0
  rsi_entry_high: 78.0
  rsi_overbought: 85.0
  ma_long: 60
  max_hold_days: 60              # 比 NDX150/SP500 120 保守，全市场噪音更多
  m2_rsi_atr_adjust: true
  m2_rsi_atr_k: 200.0
  m2_rsi_atr_cap: 8.0
  m2_vol_green_bar: false
  m2_vol_median_lookback: 5
  m2_vol_median_mult: 1.0
  m2_structure_lookback: 30
  m2_structure_eps: 0.002
  m2_breakout_mode: false
  m2_breakout_ma_trend: true
  vol_breakout_mult: 1.3
  atr_stop_mult: 2.5
  atr_target_mult: 5.0
  tp_runner_enabled: true
  atr_stop_mult_runner: 2.0
  tp_runner_lock_atr_mult: 1.0
  m3_regime_rsi_band: false
  m3_reg_rsi_lo_widen_pts_per_ma_gap_1pct: 1.5
  m3_reg_rsi_lo_widen_cap: 8.0
  m3_reg_vol_tighten_hi: false
  m3_reg_vol_hi_tighten_k: 18.0
  m3_reg_vol_hi_tighten_cap: 6.0
  m3_reg_index_atr_pct_median_window: 20
  m3_mtf_rsi_enabled: false
  m3_mtf_rsi_period: 28
  m3_mtf_rsi_min: 48.0
  m5_regime_exit_enabled: false
  partial_exit_enabled: false
  partial_exit_pct: 0.5
  partial_exit_trail_mult: 1.5

factors:
  pure_price_volume: true
  weights: {}

admission:
  min_sharpe: 0.3
  min_sortino: 0.4
  max_drawdown: 0.30
  min_win_rate: 0.35
