# 策略：美股 NASDAQ100 动量 (deprecated 不上实盘)
#
# ⚠️ DEPRECATED FOR PRODUCTION (2026-05-15)
# 8 年回测 Sharpe -0.05 / 总收益 +7% vs QQQ 被动 +241%
# 根本原因：NASDAQ100 = MAG7 集中市场，均权 momentum 无法 capture 集中度 alpha
# 实盘改用 QQQ ETF 被动持有 (详见 memory/three_universe_2026-05.md)
# 保留供研究 / 后续因子实验

name: equity_us_momentum
kind: bottomup_timing

deployments:
  - market: us_share
    enabled: false                  # 防止 daily_run 误用；如需研究改回 true
    capital_pct: 0.0

timing:
  # 仅 MA200 门控（唯一保留的覆盖）
  m2_regime_enabled: true
  m2_regime_ma_days: 200            # MA200 是美股牛熊标准分界线
  rsi_entry_low: 50.0
  rsi_entry_high: 78.0              # NASDAQ 动量股 RSI 70-80 时往往仍在上涨
  rsi_overbought: 85.0              # 延迟超买出场，避免过早离场强势股
  max_hold_days: 150                # 让利润奔跑（AI 超级周期需要 3-5 个月持仓）
  atr_target_mult: 6.0              # 更高止盈目标
  m2_rsi_atr_k: 200.0               # 降低 ATR 对 RSI 带的扰动
  m2_structure_lookback: 30         # 更长的结构突破窗口
  # 默认值（与 a_share 共享）
  m2_rsi_atr_adjust: true
  m2_rsi_atr_cap: 8.0
  m2_vol_green_bar: false
  m2_vol_median_lookback: 5
  m2_vol_median_mult: 1.0
  m2_structure_eps: 0.002
  m2_breakout_mode: false
  m2_breakout_ma_trend: true
  vol_breakout_mult: 1.3
  m3_regime_rsi_band: false
  m3_reg_rsi_lo_widen_pts_per_ma_gap_1pct: 1.5
  m3_reg_rsi_lo_widen_cap: 8.0
  m3_reg_vol_tighten_hi: false
  m3_reg_vol_hi_tighten_k: 18.0
  m3_reg_vol_hi_tighten_cap: 6.0
  m3_reg_index_atr_pct_median_window: 20
  m3_mtf_rsi_enabled: false
  m3_mtf_rsi_period: 28
  m3_mtf_rsi_min: 48.0
  m5_regime_exit_enabled: false
  partial_exit_enabled: false
  partial_exit_pct: 0.5
  partial_exit_trail_mult: 1.5

factors:
  weights:
    pe_inverse: 0.0                 # 高 PE 成长股，估值因子反效（NVDA PE 50 仍暴涨）
    pb_inverse: 0.0
    roe: 0.0
    revenue_growth: 0.0
    momentum_3m: 0.50               # 短动量：入场时机
    momentum_6m: 0.50               # 中动量：趋势强度
    fcf_yield: 0.0
    rev_accel: 0.0
  # 注：m4 配置在入口 equity_factor.yaml 全局共享（Phase 1a 设计）

# 无 hedge（未启用）
admission:
  min_sharpe: 0.5
  min_sortino: 0.7
  max_drawdown: 0.25
  min_win_rate: 0.40
