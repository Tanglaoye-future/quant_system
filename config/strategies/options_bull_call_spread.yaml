# 策略：Bull Call Spread (期权牛市看涨价差)
# 算法层完整自包含；underlying / vol_proxy / exchange / currency 走 markets/<m>.yaml。
#
# 历史：QQQ 上跑通 (us_qqq 部署)。Phase 1-A 把 underlying 硬编码抽到 market 层
#       作为后续 (Phase 1-E) 跑 HSI 双部署的前置。

name: options_bull_call_spread
kind: bull_call_spread

deployments:
  - market: us_qqq
    enabled: true

# --- 算法层 ---

# IV 引擎阈值（与具体 vol_proxy ticker 无关，仅是 IVR 分级标准）
iv_engine:
  ivr_lookback_days: 252      # 52 周
  ivr_low: 25                 # IVR < 25 → Low IV mode（便宜，买方优先）
  ivr_high: 50                # IVR > 50 → High IV mode（贵，等待或超紧价差）

# 入场参数（Bull Call Spread 结构）
entry:
  dte_min: 40
  dte_max: 65
  long_leg_delta: 0.45        # 买入腿目标 Delta
  short_leg_delta: 0.27       # 卖出腿目标 Delta
  min_spread_width_pct: 0.025 # 最小价差宽度 = 标的价格 × 2.5%
  max_bid_ask_pct: 0.06       # 单腿 bid-ask 超过 mid × 6% → 流动性不足，跳过

# 出场参数
exit:
  profit_target_mult: 2.0     # 权利金翻倍 → 止盈
  stop_loss_mult: 0.50        # 亏损 50% → 止损
  dte_warning: 21             # 剩余 21 DTE → 提醒评估滚仓

# 标的动量门控（参数市场无关，市场敏感字段如 ticker 在 market 层）
momentum:
  ma_period: 200
  rsi_period: 14
  rsi_entry_low: 50.0
  rsi_entry_high: 78.0
  lookback_days: 300

# 信号评级（综合 IV + 动量）
signal_grades:
  A: {ivr_max: 25, label: "强烈买入 — 期权便宜+动量强"}
  B: {ivr_max: 40, label: "买入 — 价差控成本"}
  C: {ivr_max: 50, label: "观望 — 权利金偏贵"}
  D: {ivr_min: 50, label: "跳过 — 期权过贵"}
