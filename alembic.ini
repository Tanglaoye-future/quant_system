# Alembic 配置 — 连接串不写死在这里，由 alembic/env.py 从 DATABASE_URL env 读取。
[alembic]
script_location = alembic
prepend_sys_path = src
path_separator = os
# sqlalchemy.url 故意留空：env.py 用 DATABASE_URL 覆盖

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
